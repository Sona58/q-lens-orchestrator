version: '3.8'

services:
  # 1. The Message Broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 2. The Quantum Engine (Worker)
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis

  # 3. The API Gateway
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8080"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
      
  # 4. The monitoring stack
  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports: ["9090:9090"]
  
  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - monitoring
      
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  grafana-agent:
    image: grafana/agent:latest
    container_name: grafana-agent
    volumes:
      - ./monitoring/grafana-agent/config.river:/etc/agent/config.river:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - agent-data:/etc/agent/data
    command:
      - run
      - /etc/agent/config.river
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      - AGENT_MODE=flow
    ports:
      - "12345:12345"
    user: root
    depends_on:
      - loki
    networks:
      - monitoring
      
networks:
  monitoring:
    driver: bridge
    
volumes:
  agent-data:
          