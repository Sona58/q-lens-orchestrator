name: Q-Lens CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Start Minikube
      uses: medyagh/setup-minikube@master
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    - name: Install dependencies for testing
      run: |
        # Install all requirements from both folders plus testing tools
        pip install pytest httpx pytest-mock
        pip install -r api/requirements.txt
        pip install -r worker/requirements.txt

    - name: Run Unit Tests
      # We set PYTHONPATH so pytest can find the 'api' and 'worker' folders
      env:
        PYTHONPATH: .
        # Use 'memory://' to prevent Celery from looking for a real Redis
        CELERY_BROKER_URL: memory://
        CELERY_RESULT_BACKEND: cache+memory://
      run: |
        # Run all tests in the tests/ folder
        # -v: verbose, -s: show print statements
        pytest tests/ -v

    # --- IMAGE BUILD ---
    - name: Build and Load Image
      run: |
        # Point the shell to Minikube's internal Docker registry
        eval $(minikube docker-env)
        
        # Build images directly inside Minikube
        docker build -t q-lens-api:latest -f docker/api.Dockerfile .
        docker build -t q-lens-worker:latest -f docker/worker.Dockerfile .

    # --- INFRASTRUCTURE SETUP ---
    - name: Deploy Infrastructure
      env:
        # Securely pull the secret from GitHub Secrets
        IBM_SECRET: ${{secrets.IBM_QUANTUM_TOKEN}}
      run: |
        # Inject the Secret
        kubectl create secret generic quantum-api-key --from-literal=IBM_TOKEN=$IBM_SECRET || true

        kubectl apply -f argo-templates/redis-deploy.yaml
        # Wait for Redis so the API doesn't crash on start
        kubectl wait --for=condition=ready pod -l app=redis --timeout=60s
        
    - name: Deploy Application
      run: |
        # Update manifests to ensure they don't try to pull from external registries
        sed -i 's/imagePullPolicy: Always/imagePullPolicy: IfNotPresent/g' argo-templates/worker-deploy.yaml
        sed -i 's/imagePullPolicy: Always/imagePullPolicy: IfNotPresent/g' argo-templates/api-deploy.yaml
        
        # Apply Manifests
        kubectl apply -f argo-templates/worker-deploy.yaml
        kubectl apply -f argo-templates/api-deploy.yaml
        
        # Force a refresh if using 'latest' tags
        kubectl rollout restart deployment/q-lens-api
        kubectl rollout restart deployment/q-lens-worker

    # --- VERIFICATION ---
    - name: Verify Deployment Integrity
      run: |
        echo "--- Waiting for Rollouts ---"
        # 1. Check Redis first (The foundation)
        kubectl rollout status deployment/redis-deployment --timeout=90s
        
        # 2. Check Application Rollouts
        kubectl rollout status deployment/q-lens-api --timeout=120s || (
          echo "ERROR: API Rollout Timed Out"
          kubectl get pods
          echo "Description of API"
          kubectl describe deployment q-lens-api
          echo "Logs of API"
          kubectl logs -l app=quantum-api --tail=50
          exit 1
        )
        
        kubectl rollout status deployment/q-lens-worker --timeout=120s || (
          echo "ERROR: Worker Rollout Timed Out"
          kubectl get pods
          echo "Description of Worker"
          kubectl describe deployment q-lens-worker
          echo "Logs of Worker"
          kubectl logs -l app=quantum-worker --tail=50
          exit 1
        )
        
        echo "--- Checking for Runtime Errors ---"
        # Check if pods are in 'Running' state. If not, fail the CI.
        API_STATUS=$(kubectl get pods -l app=quantum-api -o jsonpath='{.items[0].status.phase}')
        if [ "$API_STATUS" != "Running" ]; then
          echo "ERROR: API Pod is not running. Status: $API_STATUS"
          kubectl describe pod -l app=quantum-api
          kubectl logs -l app=quantum-api --tail=100
          exit 1
        fi
        
    - name: Performance Smoke Test
      run : |
        # Setup a tunnel so the runner can reach the Minikube service
        kubectl port-forward service/q-lens-service 8000:80 &
        
        # Give the tunnel a moment to initialize
        sleep 10
        
        # Verify the tunnel is active before starting Python
        if ! nc -z localhost 8000; then
          echo "ERROR: Tunnel failed to initialize on localhost:8000"
          exit 1
        fi
        
        # Run the stress test against localhost:8000
        python tests/stress_test.py